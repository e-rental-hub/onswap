<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UA Debug</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #111; color: #eee; }
    pre  { background: #222; padding: 16px; border-radius: 8px; white-space: pre-wrap; word-break: break-all; font-size: 13px; }
    h2   { color: #f0a03c; }
    .ok  { color: #4ade80; }
    .bad { color: #f87171; }
  </style>
</head>
<body>
  <h2>Push Notification Debug</h2>
  <pre id="out"></pre>
  <script>
    const ua = navigator.userAgent;
    const isIOS          = /iPhone|iPad|iPod/i.test(ua);
    const isAndroid      = /Android/i.test(ua);
    const hasVersion     = /Version\/[\d.]+/.test(ua);
    const hasPiBrowser   = /PiBrowser/i.test(ua);
    const isIOSWebView   = isIOS && (hasPiBrowser || !hasVersion);
    const isAndroidWV    = isAndroid && /\bwv\b/.test(ua);
    const hasNotifAPI    = typeof Notification !== 'undefined';
    const hasSW          = 'serviceWorker' in navigator;
    const permission     = hasNotifAPI ? Notification.permission : 'N/A';

    const lines = [
      `UA:\n  ${ua}\n`,
      `isIOS:            ${isIOS}`,
      `isAndroid:        ${isAndroid}`,
      `hasVersion/:      ${hasVersion}  ← real Safari always true`,
      `hasPiBrowser:     ${hasPiBrowser}`,
      `isIOSWebView:     ${isIOSWebView}`,
      `isAndroidWebView: ${isAndroidWV}`,
      `hasNotifAPI:      ${hasNotifAPI}`,
      `hasSW:            ${hasSW}`,
      `permission:       ${permission}`,
    ];

    document.getElementById('out').textContent = lines.join('\n');
  </script>
</body>
</html>
